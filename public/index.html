<!DOCTYPE html>
<html>
<head>
  <title>UNO Multiplayer</title>
  <link rel="icon" href="favicon.ico" />
  <link rel="stylesheet" href="style.css">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <style>
    @media screen and (orientation: portrait) {
      body::before {
        content: "🔄 Please Rotate Your Device";
        position: fixed;
        z-index: 9999;
        background: #0b3d2e;
        color: white;
        font-size: 22px;
        display: flex;
        align-items: center;
        justify-content: center;
        text-align: center;
        top: 0;
        left: 0;
        width: 100vw;
        height: 100vh;
      }

      #game {
        display: none !important;
      }
    }
</style>
</head>
<body>

<!-- ================= LOBBY ================= -->
<div id="lobby">
  <h2>UNO Multiplayer</h2>

  <input id="name" placeholder="Your Name" />

  <button onclick="createRoom()">Create Room</button>

  <input id="roomInput" placeholder="Room ID" />
  <button onclick="joinRoom()">Join Room</button>

  <h3>Room ID: <span id="roomId"></span></h3>

  <h3>Players</h3>
  <ul id="players"></ul>

  <button id="startBtn" onclick="startGame()">Start Game</button>
</div>


<!-- ================= GAME ================= -->
<div id="game" style="display:none;">

  <!-- Direction Arrow -->
  <img id="direction-arrow" src="images/arrow.png" />

  <!-- Light Bulb (Current Color + Penalty) -->
  <div id="light-bulb">
    <div id="penalty-badge"></div>
  </div>

  <!-- Center Table -->
  <div id="table">

    <!-- Draw Pile -->
    <div id="draw-pile" class="pile">
      <img src="cards/card_back.png" onclick="drawCard()" />
    </div>

    <!-- Discard Pile -->
    <div id="discard-pile" class="pile">
      <img id="top-card-img" />
    </div>

  </div>

  <!-- Opponents -->
  <div id="opponents-container"></div>

  <!-- Player Hand Area -->
  <div id="handContainer">
    <div id="your-turn-indicator"></div>
    <div id="my-card-count"></div>
    <div id="player-hand"></div>
  </div>

  <!-- ================= MODALS ================= -->

  <!-- Wild Color Modal -->
  <div id="colorModal" class="modal" style="display:none;">
    <div class="modal-box">
      <h3>Select Next Color</h3>
      <div class="color-grid">
        <button onclick="pickColor('red')" style="background:red;"></button>
        <button onclick="pickColor('blue')" style="background:blue;"></button>
        <button onclick="pickColor('green')" style="background:green;"></button>
        <button onclick="pickColor('yellow')" style="background:yellow;"></button>
      </div>
      <button id="colorCancelBtn" onclick="cancelWild()">Cancel</button>
    </div>
  </div>

  <!-- Swap Modal -->
  <div id="swapModal" class="modal" style="display:none;">
    <div class="modal-box">
      <h3>Choose Player to Swap</h3>
      <div id="swapPlayerList"></div>
      <button onclick="cancelSwap()">Cancel</button>
    </div>
  </div>

  <!-- Elimination Drop Overlay -->
  <div id="elimination-overlay"></div>

</div>


<!-- ================= WINNER SCREEN ================= -->
<div id="winner-screen" style="display:none;">
  <div class="winner-box">
    <h1 id="winner-name"></h1>
    <div class="winner-buttons">
      <button id="rematchBtn" onclick="rematch()">Play Again</button>
      <button id="exitBtn" onclick="exitGameHandler()">Exit</button>
    </div>
  </div>
</div>


<!-- ================= SCRIPTS ================= -->
<script src="/socket.io/socket.io.js"></script>
<script src="client.js"></script>

</body>
</html>
